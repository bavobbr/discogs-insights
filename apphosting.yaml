# Configure Firebase App Hosting for Next.js

# We do not need heavy custom configuration as App Hosting natively supports Next.js.
# However, this file scaffolds future environment variables.

env:
  - variable: NEXT_PUBLIC_API_URL
    value: /api
  - variable: DISCOGS_PAT
    secret: DISCOGS_PAT
  - variable: DISCOGS_USERNAME
    value: bavobbr
  - variable: DEV_LIMIT
    value: "500"
